workflows:
  # iOS build workflow
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_credentials  # APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_PRIVATE_KEY
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm ci
      - name: Sync Capacitor iOS
        script: |
          cd mobile
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd mobile/ios/App
          pod install
      - name: Set up iOS code signing
        script: |
          app-store-connect fetch-signing-files "net.mycarecompanion.app" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd mobile/ios/App
          xcodebuild build -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual
      - name: Export IPA
        script: |
          cd mobile/ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist build/App.xcarchive/Info.plist \
            -exportPath build/export
    artifacts:
      - mobile/ios/App/build/export/*.ipa
    publishing:
      email:
        recipients:
          - bryan@bluebonnettech.com

  # Android build workflow
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux
    environment:
      groups:
        - android_signing   # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_KEYSTORE_PASSWORD
      node: 20
      java: 21
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm ci
      - name: Sync Capacitor Android
        script: |
          cd mobile
          mkdir -p android/app/src/main/assets/public
          npx cap sync android
      - name: Build Android
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../../infrastructure/carecompanion-upload.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - mobile/android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - bryan@bluebonnettech.com
