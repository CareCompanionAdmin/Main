workflows:
  # iOS build workflow
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: net.mycarecompanion.app
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm ci
      - name: Sync Capacitor iOS
        script: |
          cd mobile
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd mobile/ios/App
          pod install
      - name: Set up iOS code signing
        script: |
          echo "=== Injected profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "No profiles dir"
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
          cd mobile/ios/App
          xcode-project use-profiles --warn-only
          echo "=== pbxproj signing settings after use-profiles ==="
          grep -E "CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PROVISIONING_PROFILE|CODE_SIGN_IDENTITY" App.xcodeproj/project.pbxproj || true
      - name: Set iOS build number
        script: |
          cd mobile/ios/App
          echo "Codemagic BUILD_NUMBER: $BUILD_NUMBER"
          sed -i '' -E "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/g" App.xcodeproj/project.pbxproj
          echo "=== Build number after bump ==="
          grep "CURRENT_PROJECT_VERSION" App.xcodeproj/project.pbxproj | sort -u
      - name: Build iOS
        script: |
          cd mobile/ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App
    artifacts:
      - mobile/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - bryan@bluebonnettech.com

  # Android build workflow
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux
    environment:
      groups:
        - android_signing   # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_KEYSTORE_PASSWORD
      node: 20
      java: 21
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm ci
      - name: Sync Capacitor Android
        script: |
          cd mobile
          mkdir -p android/app/src/main/assets/public
          npx cap sync android
      - name: Build Android
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../../infrastructure/carecompanion-upload.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - mobile/android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - bryan@bluebonnettech.com
