workflows:
  # iOS build workflow
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm ci
      - name: Sync Capacitor iOS
        script: |
          cd mobile
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd mobile/ios/App
          pod install
      - name: Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "net.mycarecompanion.app" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          # Debug: show what was installed
          echo "=== Installed profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "No profiles dir"
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
          echo "=== Profile details ==="
          for f in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
            echo "--- $f ---"
            security cms -D -i "$f" 2>/dev/null | grep -A1 "UUID\|TeamIdentifier\|Name" | head -10
          done
      - name: Build iOS
        script: |
          cd mobile/ios/App
          # Find provisioning profile UUID
          PROFILE_PATH=$(ls "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
            PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
            echo "Using profile: $PROFILE_NAME ($PROFILE_UUID)"
          fi
          SIGN_ID=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Using identity: $SIGN_ID"
          xcodebuild archive -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=33MD3X7Z3D \
            CODE_SIGN_IDENTITY="$SIGN_ID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER=""
      - name: Export IPA
        script: |
          cd mobile/ios/App
          PROFILE_PATH=$(ls "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision 2>/dev/null | head -1)
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          cat > exportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>33MD3X7Z3D</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>net.mycarecompanion.app</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist
    artifacts:
      - mobile/ios/App/build/export/*.ipa
    publishing:
      email:
        recipients:
          - bryan@bluebonnettech.com

  # Android build workflow
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux
    environment:
      groups:
        - android_signing   # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_KEYSTORE_PASSWORD
      node: 20
      java: 21
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm ci
      - name: Sync Capacitor Android
        script: |
          cd mobile
          mkdir -p android/app/src/main/assets/public
          npx cap sync android
      - name: Build Android
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../../infrastructure/carecompanion-upload.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - mobile/android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - bryan@bluebonnettech.com
