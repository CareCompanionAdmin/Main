workflows:
  # iOS build workflow
  ios-build:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm ci
      - name: Sync Capacitor iOS
        script: |
          cd mobile
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd mobile/ios/App
          pod install
      - name: Set up iOS code signing
        script: |
          app-store-connect fetch-signing-files "net.mycarecompanion.app" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd mobile/ios/App
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE" ]; then
            echo "ERROR: No provisioning profile found"
            exit 1
          fi
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i "$PROFILE"))
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin <<< $(security cms -D -i "$PROFILE"))
          SIGN_ID=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Profile UUID: $PROFILE_UUID"
          echo "Team ID: $TEAM_ID"
          echo "Signing Identity: $SIGN_ID"
          xcodebuild archive -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="$SIGN_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID"
      - name: Export IPA
        script: |
          cd mobile/ios/App
          cat > exportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>33MD3X7Z3D</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist
    artifacts:
      - mobile/ios/App/build/export/*.ipa
    publishing:
      email:
        recipients:
          - bryan@bluebonnettech.com

  # Android build workflow
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: linux
    environment:
      groups:
        - android_signing   # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_KEYSTORE_PASSWORD
      node: 20
      java: 21
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'mobile-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm ci
      - name: Sync Capacitor Android
        script: |
          cd mobile
          mkdir -p android/app/src/main/assets/public
          npx cap sync android
      - name: Build Android
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../../infrastructure/carecompanion-upload.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - mobile/android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - bryan@bluebonnettech.com
