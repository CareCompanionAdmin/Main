version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: carecompanion-dev-postgres
    environment:
      POSTGRES_USER: carecompanion
      POSTGRES_PASSWORD: carecompanion
      POSTGRES_DB: carecompanion
    ports:
      - "5432:5432"
    volumes:
      - dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carecompanion"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: carecompanion-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  dev-postgres-data:
  dev-redis-data:
