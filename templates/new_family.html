<!DOCTYPE html>
<html lang="en">
{{template "head" "Create Family"}}
<body class="calm-bg min-h-screen">

{{template "nav" .}}
{{template "mascot" .}}

<main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="glass ring-soft rounded-3xl p-8 transition-colors">
        <h1 class="display text-3xl font-medium text-stone-800 mb-2">Create a Family</h1>
        <p class="text-gray-500 mb-6">A family allows you to add children and invite other caregivers.</p>

        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6"></div>

        <form id="family-form" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Family Name *</label>
                <input id="name" name="name" type="text" required
                    class="mt-1 block w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                    placeholder="e.g., The Smith Family">
            </div>

            <div class="flex space-x-4">
                <button type="submit"
                    class="flex-1 py-3 px-4 bg-orange-600 text-white rounded-lg hover:bg-orange-700 font-medium transition-colors">
                    Create Family
                </button>
            </div>
        </form>
    </div>
</main>

<script>
document.getElementById('family-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const submitBtn = this.querySelector('button[type="submit"]');
    if (submitBtn.disabled) return;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating...';

    const name = document.getElementById('name').value;
    const errorDiv = document.getElementById('error-message');
    errorDiv.classList.add('hidden');

    try {
        const token = localStorage.getItem('access_token');
        const response = await fetch('/api/families', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ name })
        });

        const data = await response.json();

        if (!response.ok) {
            errorDiv.textContent = data.message || 'Failed to create family';
            errorDiv.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Family';
            return;
        }

        // Switch to new family context
        const switchResponse = await fetch('/api/auth/switch-family', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            credentials: 'same-origin',
            body: JSON.stringify({ family_id: data.id })
        });

        if (switchResponse.ok) {
            const switchData = await switchResponse.json();
            // Update localStorage for JS API calls
            localStorage.setItem('access_token', switchData.access_token);
            // Server already sets HttpOnly cookies via Set-Cookie headers
        }

        window.location.href = '/dashboard';
    } catch (error) {
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Family';
    }
});

async function logout() {
    try {
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    } catch (e) {}
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    document.cookie = 'access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
    document.cookie = 'refresh_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/api/auth/refresh;';
    window.location.href = '/login';
}
</script>
</body>
</html>
