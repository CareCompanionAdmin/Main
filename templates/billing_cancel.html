<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Checkout Cancelled - MyCareCompanion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/capacitor-bridge.js" defer></script>
    <link rel="stylesheet" href="/static/css/calm.css">
</head>
<body class="calm-bg min-h-screen">
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="glass ring-soft rounded-3xl p-10 max-w-md w-full text-center">
        <div class="w-16 h-16 bg-amber-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <svg class="w-8 h-8 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01"></path>
            </svg>
        </div>
        <h1 class="display text-3xl font-medium text-stone-800 mb-2">Checkout cancelled</h1>
        <p class="text-stone-600 mb-6">
            No worries — nothing was charged. Your existing plan is unchanged. You can start checkout again any time from Settings.
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/settings" class="inline-block px-5 py-2.5 bg-orange-600 text-white rounded-full hover:bg-orange-700 font-medium shadow-sm shadow-orange-600/20 transition">
                Back to settings
            </a>
            <a href="/dashboard" class="inline-block px-5 py-2.5 bg-white/70 border border-stone-200 text-stone-700 rounded-full hover:bg-white font-medium transition">
                Dashboard
            </a>
        </div>
    </div>
</div>
</body>
</html>
