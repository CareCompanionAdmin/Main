<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Subscription Active - MyCareCompanion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="/static/js/capacitor-bridge.js" defer></script>
    <link rel="stylesheet" href="/static/css/calm.css">
</head>
<body class="calm-bg min-h-screen">
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
        <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">You're all set!</h1>
        <p class="text-gray-600 mb-6">
            Your subscription is now active. Thanks for supporting MyCareCompanion — we'll keep building.
        </p>
        {{if .Billing}}
        <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
            <div class="flex justify-between text-sm mb-2">
                <span class="text-gray-500">Plan</span>
                <span class="font-medium text-gray-900">{{.Billing.PlanName}}</span>
            </div>
            <div class="flex justify-between text-sm mb-2">
                <span class="text-gray-500">Price</span>
                <span class="font-medium text-gray-900">{{.Billing.PriceDisplay}}/month</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-gray-500">Next renewal</span>
                <span class="font-medium text-gray-900">{{.Billing.ExpirationDisplay}}</span>
            </div>
        </div>
        {{end}}
        <a href="/dashboard" class="inline-block px-6 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700">
            Back to Dashboard
        </a>
    </div>
</div>
</body>
</html>
