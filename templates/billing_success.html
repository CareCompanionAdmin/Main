<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Subscription Active - MyCareCompanion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/capacitor-bridge.js" defer></script>
    <link rel="stylesheet" href="/static/css/calm.css">
</head>
<body class="calm-bg min-h-screen">
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="glass ring-soft rounded-3xl p-10 max-w-md w-full text-center">
        <div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <p class="handwritten text-2xl text-orange-800">Thank you.</p>
        <h1 class="display text-3xl font-medium text-stone-800 mt-1 mb-2">You're all set.</h1>
        <p class="text-stone-600 mb-6">
            Your subscription is active. Thanks for supporting MyCareCompanion — we'll keep building.
        </p>
        {{if .Billing}}
        <div class="bg-white/70 border border-stone-200 rounded-2xl p-4 mb-6 text-left">
            <div class="flex justify-between text-sm mb-2">
                <span class="text-stone-500">Plan</span>
                <span class="font-medium text-stone-800">{{.Billing.PlanName}}</span>
            </div>
            <div class="flex justify-between text-sm mb-2">
                <span class="text-stone-500">Price</span>
                <span class="font-medium text-stone-800">{{.Billing.PriceDisplay}}/month</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-stone-500">Next renewal</span>
                <span class="font-medium text-stone-800">{{.Billing.ExpirationDisplay}}</span>
            </div>
        </div>
        {{end}}
        <a href="/dashboard" class="inline-block px-6 py-2.5 bg-orange-600 text-white rounded-full hover:bg-orange-700 font-medium shadow-sm shadow-orange-600/20 transition">
            Back to dashboard
        </a>
    </div>
</div>
</body>
</html>
