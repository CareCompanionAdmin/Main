<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - MyCareCompanion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/calm.css">
</head>
<body class="calm-bg min-h-screen">
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="glass ring-soft rounded-3xl p-10 max-w-md w-full text-center">
        <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
            <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        <p class="text-xs uppercase tracking-widest text-stone-500 font-semibold">Error {{.StatusCode}}</p>
        <h1 class="display text-3xl font-medium text-stone-800 mt-1 mb-2">Something went sideways</h1>
        <p class="text-stone-600 mb-6">{{.Error}}</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="javascript:history.back()" class="inline-block px-5 py-2.5 bg-white/70 border border-stone-200 text-stone-700 rounded-full hover:bg-white font-medium transition">
                Go back
            </a>
            <a href="/dashboard" class="inline-block px-5 py-2.5 bg-orange-600 text-white rounded-full hover:bg-orange-700 font-medium shadow-sm shadow-orange-600/20 transition">
                Open dashboard
            </a>
        </div>
    </div>
</div>
</body>
</html>
