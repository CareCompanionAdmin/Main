{{define "content"}}
<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Version Log</h1>
        <span class="text-sm text-gray-500">Auto-populated from git history &amp; deployments</span>
    </div>

    <!-- Pending Changes Section -->
    <div id="pendingSection" class="mb-8 hidden">
        <div class="bg-amber-50 border border-amber-200 rounded-lg p-5">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold text-amber-800">Pending Changes (Dev Only)</h2>
                <span id="pendingBadge" class="px-3 py-1 text-sm font-medium rounded-full bg-amber-200 text-amber-900"></span>
            </div>
            <p id="lastDeployInfo" class="text-sm text-amber-700 mb-4"></p>

            <!-- Uncommitted files -->
            <div id="uncommittedSection" class="hidden mb-4">
                <h3 class="text-sm font-semibold text-amber-700 mb-2">Uncommitted File Changes</h3>
                <div id="uncommittedList" class="space-y-1"></div>
            </div>

            <!-- Committed but not deployed -->
            <div id="pendingCommitsSection" class="hidden">
                <h3 class="text-sm font-semibold text-amber-700 mb-2">Commits Not Yet Deployed</h3>
                <div id="pendingList" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- Up to Date Banner -->
    <div id="upToDateSection" class="mb-8 hidden">
        <div class="bg-green-50 border border-green-200 rounded-lg p-5 text-center">
            <svg class="w-8 h-8 text-green-500 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <h2 class="text-lg font-semibold text-green-800">Production is Up to Date</h2>
            <p id="upToDateInfo" class="text-sm text-green-600 mt-1"></p>
        </div>
    </div>

    <!-- Change History -->
    <div>
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Change History</h2>
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Description</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Commit</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody" class="divide-y divide-gray-200">
                    <tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Summary -->
    <div class="mt-4 text-sm text-gray-500 text-center">
        <span id="summaryText"></span>
    </div>
</div>

<script>
const typeBadgeColors = {
    'Feature':     'bg-purple-100 text-purple-800',
    'Bug Fix':     'bg-red-100 text-red-800',
    'Improvement': 'bg-blue-100 text-blue-800',
    'Refactor':    'bg-gray-100 text-gray-800',
    'Security':    'bg-orange-100 text-orange-800',
    'Performance': 'bg-yellow-100 text-yellow-800',
    'Docs':        'bg-teal-100 text-teal-800',
    'Style':       'bg-pink-100 text-pink-800',
    'Test':        'bg-cyan-100 text-cyan-800',
    'Chore':       'bg-gray-100 text-gray-600',
    'Update':      'bg-gray-100 text-gray-600'
};

const fileStatusColors = {
    'modified': 'bg-blue-100 text-blue-800',
    'new':      'bg-green-100 text-green-800',
    'deleted':  'bg-red-100 text-red-800'
};

function makeTypeBadge(entryType) {
    const cls = typeBadgeColors[entryType] || typeBadgeColors['Update'];
    return `<span class="px-2 py-0.5 text-xs font-medium rounded-full ${cls}">${escapeHtml(entryType)}</span>`;
}

function makeFileStatusBadge(status) {
    const cls = fileStatusColors[status] || fileStatusColors['modified'];
    return `<span class="px-2 py-0.5 text-xs font-medium rounded-full ${cls}">${escapeHtml(status)}</span>`;
}

function makeStatusBadge(isDeployed) {
    if (isDeployed) {
        return '<span class="px-2 py-0.5 text-xs font-medium rounded-full bg-green-100 text-green-800">Deployed</span>';
    }
    return '<span class="px-2 py-0.5 text-xs font-medium rounded-full bg-yellow-100 text-yellow-800">Pending</span>';
}

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatDateTime(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function makeDeploymentRow(deployment) {
    const ts = formatDateTime(deployment.timestamp + ' UTC');
    return `<tr class="bg-green-50">
        <td colspan="5" class="px-4 py-2 text-center">
            <span class="inline-flex items-center text-sm font-medium text-green-700">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                Deployed to Production &mdash; ${escapeHtml(ts)}
            </span>
        </td>
    </tr>`;
}

async function loadVersionLog() {
    try {
        const data = await apiCall('GET', '/api/admin/super/version-log');

        const uncommitted = data.uncommitted || [];
        const pending = data.pending || [];
        const history = data.history || [];
        const deployments = data.deployments || [];
        const lastDeploy = data.last_deploy || '';
        const totalPending = data.pending_count || 0;

        // Show pending section if there are uncommitted files OR undeployed commits
        if (totalPending > 0) {
            document.getElementById('pendingSection').classList.remove('hidden');
            document.getElementById('upToDateSection').classList.add('hidden');
            document.getElementById('pendingBadge').textContent = totalPending + ' change' + (totalPending !== 1 ? 's' : '') + ' pending';
            document.getElementById('lastDeployInfo').textContent = 'Last production deploy: ' + (lastDeploy ? formatDateTime(lastDeploy + ' UTC') : 'Never');

            // Uncommitted files
            if (uncommitted.length > 0) {
                document.getElementById('uncommittedSection').classList.remove('hidden');
                document.getElementById('uncommittedList').innerHTML = uncommitted.map(f => `
                    <div class="flex items-center gap-3 bg-white rounded px-3 py-2 border border-amber-100">
                        ${makeFileStatusBadge(f.status)}
                        <span class="text-sm text-gray-900 flex-1">${escapeHtml(f.description)}</span>
                        <code class="text-xs text-gray-400 font-mono hidden sm:inline">${escapeHtml(f.file_path)}</code>
                    </div>
                `).join('');
            } else {
                document.getElementById('uncommittedSection').classList.add('hidden');
            }

            // Committed but not deployed
            if (pending.length > 0) {
                document.getElementById('pendingCommitsSection').classList.remove('hidden');
                document.getElementById('pendingList').innerHTML = pending.map(c => `
                    <div class="flex items-center gap-3 bg-white rounded px-3 py-2 border border-amber-100">
                        ${makeTypeBadge(c.entry_type)}
                        <span class="text-sm text-gray-900 flex-1">${escapeHtml(c.title)}</span>
                        <span class="text-xs text-gray-500">${formatDate(c.date)}</span>
                        <code class="text-xs text-gray-400 font-mono">${escapeHtml(c.short_hash)}</code>
                    </div>
                `).join('');
            } else {
                document.getElementById('pendingCommitsSection').classList.add('hidden');
            }
        } else {
            document.getElementById('pendingSection').classList.add('hidden');
            document.getElementById('upToDateSection').classList.remove('hidden');
            document.getElementById('upToDateInfo').textContent = lastDeploy ? 'Last deployed: ' + formatDateTime(lastDeploy + ' UTC') : 'No deployments recorded yet';
        }

        // Build deployment timestamp lookup (parse to epoch for comparison)
        const deployTimes = deployments.map(d => {
            const t = new Date(d.timestamp + ' UTC');
            return { time: t.getTime(), record: d };
        }).sort((a, b) => b.time - a.time); // newest first

        // Build history rows with deployment markers interspersed
        const tbody = document.getElementById('historyBody');
        let rows = [];

        // If there are uncommitted changes, show them at the top of history too
        if (uncommitted.length > 0) {
            rows.push(`<tr class="bg-amber-50">
                <td colspan="5" class="px-4 py-2 text-center">
                    <span class="inline-flex items-center text-sm font-medium text-amber-700">
                        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                        </svg>
                        ${uncommitted.length} uncommitted file change${uncommitted.length !== 1 ? 's' : ''} in dev
                    </span>
                </td>
            </tr>`);
        }

        if (history.length === 0 && uncommitted.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">No changes found</td></tr>';
        } else {
            let deployIdx = 0;

            for (const commit of history) {
                const commitTime = new Date(commit.date).getTime();

                // Insert any deployment markers that occurred after this commit (since history is newest-first)
                while (deployIdx < deployTimes.length && deployTimes[deployIdx].time > commitTime) {
                    rows.push(makeDeploymentRow(deployTimes[deployIdx].record));
                    deployIdx++;
                }

                rows.push(`
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm text-gray-600 whitespace-nowrap">${formatDate(commit.date)}</td>
                        <td class="px-4 py-3">${makeTypeBadge(commit.entry_type)}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${escapeHtml(commit.title)}</td>
                        <td class="px-4 py-3"><code class="text-xs text-gray-500 font-mono">${escapeHtml(commit.short_hash)}</code></td>
                        <td class="px-4 py-3">${makeStatusBadge(commit.is_deployed)}</td>
                    </tr>
                `);
            }

            // Insert any remaining deployments
            while (deployIdx < deployTimes.length) {
                rows.push(makeDeploymentRow(deployTimes[deployIdx].record));
                deployIdx++;
            }

            tbody.innerHTML = rows.join('');
        }

        // Summary
        const parts = [data.total_commits + ' total commits', deployments.length + ' production deployments'];
        if (uncommitted.length > 0) parts.push(uncommitted.length + ' uncommitted files');
        if (pending.length > 0) parts.push(pending.length + ' undeployed commits');
        document.getElementById('summaryText').textContent = parts.join(', ');

    } catch (err) {
        // apiCall already shows alert
    }
}

document.addEventListener('DOMContentLoaded', loadVersionLog);
</script>
{{end}}
