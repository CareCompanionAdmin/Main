<script>
function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    const openIcon = document.getElementById('menu-icon-open');
    const closeIcon = document.getElementById('menu-icon-close');

    menu.classList.toggle('hidden');
    openIcon.classList.toggle('hidden');
    closeIcon.classList.toggle('hidden');
}

// Close mobile menu when clicking outside
document.addEventListener('click', function(event) {
    const menu = document.getElementById('mobile-menu');
    const menuBtn = document.getElementById('mobile-menu-btn');

    if (menu && !menu.classList.contains('hidden') && !menu.contains(event.target) && !menuBtn.contains(event.target)) {
        toggleMobileMenu();
    }
});

// Poll for unread chat messages
async function checkChatUnread() {
    try {
        const response = await fetch('/api/chat/unread', { credentials: 'include' });
        if (response.ok) {
            const data = await response.json();
            const count = data.unread_count || 0;
            const badge = document.getElementById('chat-badge');
            const badgeMobile = document.getElementById('chat-badge-mobile');
            if (badge) {
                if (count > 0) {
                    badge.textContent = count > 9 ? '9+' : count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
            if (badgeMobile) {
                if (count > 0) {
                    badgeMobile.textContent = count + ' new';
                    badgeMobile.classList.remove('hidden');
                } else {
                    badgeMobile.classList.add('hidden');
                }
            }
        }
    } catch (e) {}
}

// Poll for unread support messages
async function checkSupportUnread() {
    try {
        const response = await fetch('/api/support/unread', { credentials: 'include' });
        if (response.ok) {
            const data = await response.json();
            const hasUnread = data.has_unread || false;
            ['support-badge-desktop', 'support-badge-mobile'].forEach(function(id) {
                const badge = document.getElementById(id);
                if (badge) {
                    badge.classList.toggle('hidden', !hasUnread);
                }
            });
        }
    } catch (e) {}
}

// Check immediately on page load, then poll every 30 seconds
checkChatUnread();
checkSupportUnread();
setInterval(checkChatUnread, 5000);
setInterval(checkSupportUnread, 60000);

async function logout() {
    try {
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    } catch (e) {}
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    document.cookie = 'access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
    document.cookie = 'refresh_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/api/auth/refresh;';
    window.location.href = '/login';
}
</script>
