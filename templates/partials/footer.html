{{define "footer"}}
<!-- Footer -->
<footer class="bg-white/60 backdrop-blur border-t border-stone-200/60 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex flex-col sm:flex-row items-center gap-4 sm:gap-6 text-sm">
                <button onclick="openHelpModal()" class="text-stone-500 hover:text-orange-700 flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Help
                </button>
                <a href="/privacy" class="text-stone-500 hover:text-orange-700 transition-colors">Privacy</a>
                <a href="/terms" class="text-stone-500 hover:text-orange-700 transition-colors">Terms</a>
                <a href="/support" class="text-stone-500 hover:text-orange-700 transition-colors">Contact us</a>
            </div>
            <div class="text-xs text-stone-400 italic">
                A calmer way to care &middot; &copy; {{.Year}} MyCareCompanion
            </div>
        </div>
    </div>
</footer>
{{end}}
