<!DOCTYPE html>
<html lang="en">
{{template "head" "Login"}}
<body class="calm-bg min-h-screen">
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <p class="handwritten text-3xl text-orange-800">Welcome back.</p>
            <h1 class="display text-4xl font-medium text-stone-800 mt-1">MyCareCompanion</h1>
            <p class="mt-2 text-stone-500">Sign in to pick up where you left off.</p>
        </div>

        <div class="glass ring-soft rounded-3xl p-8">
            <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-2xl mb-4 text-sm"></div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-xs uppercase tracking-widest text-stone-500 font-semibold mb-1.5">Email address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required
                        class="w-full px-4 py-3 border border-stone-200 rounded-2xl bg-white/80 placeholder-stone-400 text-stone-800 focus:outline-none focus:ring-2 focus:ring-orange-300 focus:border-orange-400 sm:text-sm transition"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label for="password" class="block text-xs uppercase tracking-widest text-stone-500 font-semibold mb-1.5">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        class="w-full px-4 py-3 border border-stone-200 rounded-2xl bg-white/80 placeholder-stone-400 text-stone-800 focus:outline-none focus:ring-2 focus:ring-orange-300 focus:border-orange-400 sm:text-sm transition"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full bg-orange-600 hover:bg-orange-700 text-white font-semibold py-3 rounded-full shadow-lg shadow-orange-600/20 transition-colors">
                    Sign in
                </button>

                <p class="text-center text-sm text-stone-500">
                    Don't have an account?
                    <a href="/register" class="font-medium text-orange-700 hover:text-orange-900">Sign up</a>
                </p>
            </form>
        </div>

        <p class="text-center text-xs text-stone-500 italic mt-6">A calmer way to care.</p>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const submitBtn = this.querySelector('button[type="submit"]');
    if (submitBtn.disabled) return;
    submitBtn.disabled = true;

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');

    errorDiv.classList.add('hidden');

    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
            errorDiv.textContent = data.message || 'Login failed';
            errorDiv.classList.remove('hidden');
            submitBtn.disabled = false;
            return;
        }

        // Store in localStorage for JavaScript access (API calls)
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        // Server already sets HttpOnly cookies via Set-Cookie headers
        // Honor ?return=<path> so users land back where they were when their
        // session expired (set by auth middleware redirect). Same-origin only —
        // an attacker-supplied absolute URL won't redirect off our domain.
        var returnTo = '/dashboard';
        var qp = new URLSearchParams(window.location.search);
        var ret = qp.get('return');
        if (ret && ret.charAt(0) === '/' && ret.charAt(1) !== '/') {
            returnTo = ret;
        }
        window.location.href = returnTo;
    } catch (error) {
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.classList.remove('hidden');
        submitBtn.disabled = false;
    }
});
</script>
</body>
</html>
